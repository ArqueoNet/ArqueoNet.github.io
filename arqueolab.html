<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArqueoLab Pro - Gestión y Servicios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2e7d32; 
            --bg: #f4f7f4; 
            --dark-pro: #0f172a;
            --gold: #f59e0b;
            --accent-blue: #2563eb;
            --nav-height: 4.5rem;
        }
        
        body { 
            background-color: var(--bg); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            color: var(--dark-pro);
        }

        /* Navbar Consistente */
        .glass-nav {
            background: var(--dark-pro);
            color: white;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            height: var(--nav-height);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .nav-brand-center { font-weight: 900; letter-spacing: 4px; font-size: 1.4rem; color: var(--gold); text-align: center; }
        .nav-back a { color: white; text-decoration: none; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1.2rem; border-radius: 2rem; }

        /* Layout de 3 Columnas */
        .main-layout {
            max-width: 95%;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: 20rem 1fr 18rem;
            gap: 2rem;
        }

        /* --- COLUMNA IZQUIERDA: SERVICIOS (NUEVOS BOTONES) --- */
        .services-sidebar {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            height: fit-content;
            position: sticky;
            top: 6.5rem;
        }
        .services-sidebar h3 { font-size: 0.8rem; text-transform: uppercase; color: #64748b; margin-bottom: 1.5rem; letter-spacing: 1px; }
        
        .btn-folio {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.6rem;
            color: var(--dark-pro);
            font-weight: 600;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn-folio:hover { 
            background: var(--dark-pro); 
            color: white; 
            transform: translateX(5px);
        }
        .btn-folio span { font-size: 1.2rem; }

        /* --- COLUMNA CENTRAL: EL WIZARD EXISTENTE --- */
        .wizard-container {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .progress-container { background: #eee; height: 8px; border-radius: 4px; margin: 2rem 0; overflow: hidden; }
        .progress-bar { background: var(--primary); height: 100%; width: 25%; transition: 0.4s; }
        
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        input, select, textarea { 
            width: 100%; padding: 0.8rem; margin-bottom: 1.5rem; 
            border: 1px solid #ddd; border-radius: 8px; font-family: inherit;
        }

        .nav-btns { display: flex; justify-content: space-between; margin-top: 2rem; }
        button.nav-btn { 
            padding: 0.8rem 2rem; border-radius: 8px; border: none; 
            font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn-prev { background: #e0e0e0; }
        .btn-next { background: var(--primary); color: white; }

        /* --- COLUMNA DERECHA: HISTORIAL --- */
        .history-card { background: white; padding: 1.5rem; border-radius: 1rem; border: 1px solid #e2e8f0; }
        .history-card h4 { margin-bottom: 1rem; border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th { text-align: left; color: #64748b; padding-bottom: 0.8rem; }
        td { padding: 0.8rem 0; border-top: 1px solid #f1f5f9; }

    </style>
</head>
<body>

<nav class="glass-nav">
    <div class="nav-module">🔬 ArqueoLab / Registro Científico</div>
    <div class="nav-brand-center">ROBOT CITY POBRA</div>
    <div class="nav-back"><a href="index.html">← VOLVER</a></div>
</nav>

<div class="main-layout">
    
    <aside class="services-sidebar">
        <h3>Servicios de Red Científica</h3>
        
        <button class="btn-folio"> Información de hallazgos</button>
        <button class="btn-folio"> Registros de excavaciones</button>
        <button class="btn-folio"> Fotografias y datos</button>
        <button class="btn-folio"> Laboratorio</button>
        <button class="btn-folio"> Información geológica</button>
        <button class="btn-folio"> Información paleontológica</button>

    </aside>

    <main class="wizard-container">
        <header>
            <h2 style="color: var(--primary);">Nuevo Registro de Hallazgo</h2>
            <p style="color: #64748b; font-size: 0.9rem;">Sigue los pasos para la catalogación oficial en ArqueoNet.</p>
        </header>

        <div class="progress-container">
            <div id="progress" class="progress-bar"></div>
        </div>

        <form id="arqueoForm">
            <div class="step active" id="step1">
                <label>ID del Hallazgo (Auto-generado)</label>
                <input type="text" id="id_hallazgo" value="LAB-2026-004">
                
                <label>Tipo de Material</label>
                <select id="tipo_hallazgo">
                    <option>Cerámica</option>
                    <option>Lítico</option>
                    <option>Metálico</option>
                    <option>Orgánico</option>
                </select>
                <img src="https://media-cdn.tripadvisor.com/media/photo-s/07/0a/07/0a/dolmen-de-axeitos.jpg" class="artifact-img">
            </div>

            <div class="step" id="step2">
                <label>Ubicación (Unidad Estratigráfica)</label>
                <input type="text" id="ue" placeholder="Ej: UE 105">
                
                <label>Coordenadas GIS</label>
                <input type="text" placeholder="Lat: 42.12 / Lon: -8.15">
            </div>

            <div class="step" id="step3">
                <label>Estado de Conservación</label>
                <select>
                    <option>Excelente</option>
                    <option>Bueno (Necesita Limpieza)</option>
                    <option>Frágil (Urgente)</option>
                </select>
                <label>Observaciones Preliminares</label>
                <textarea rows="4" placeholder="Describe brevemente el contexto..."></textarea>
            </div>

            <div class="nav-btns">
                <button type="button" class="nav-btn btn-prev" id="prevBtn" onclick="changeStep(-1)" disabled>Anterior</button>
                <button type="button" class="nav-btn btn-next" id="nextBtn" onclick="changeStep(1)">Siguiente</button>
            </div>
        </form>
    </main>

    <aside>
        <div class="history-card">
            <h4>📡 Sincronización Live</h4>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="historial">
                    <tr>
                        <td><b>#001</b></td>
                        <td>Moneda</td>
                        <td style="color: green;">✔ OK</td>
                    </tr>
                    <tr>
                        <td><b>#002</b></td>
                        <td>Ánfora</td>
                        <td style="color: green;">✔ OK</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </aside>

</div>

<script>
    let currentStep = 1;
    const totalSteps = 3;

    function changeStep(n) {
        document.getElementById(`step${currentStep}`).classList.remove('active');
        currentStep += n;

        if (currentStep > totalSteps) {
            alert("¡Hallazgo registrado y sincronizado con ArqueoConnect!");
            location.reload();
            return;
        }

        document.getElementById(`step${currentStep}`).classList.add('active');
        document.getElementById('progress').style.width = (currentStep / totalSteps) * 100 + "%";
        
        document.getElementById('prevBtn').disabled = (currentStep === 1);
        document.getElementById('nextBtn').innerText = (currentStep === totalSteps) ? "Finalizar" : "Siguiente";
    }

    // "Nos entendemos": Mensaje para los botones que no deben funcionar aún
    document.querySelectorAll('.btn-folio').forEach(btn => {
        btn.onclick = () => {
            console.log(`Módulo solicitado: ${btn.innerText.trim()} - Pendiente de backend.`);
            alert(`El módulo ${btn.innerText.trim()} aún no está disponible. Lamentamos las molestias`);
        };
    });
</script>
</body>
</html>
